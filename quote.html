<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request a Quote | Xtreme Security</title>
    <link rel="stylesheet" href="assets/css/master.css">
</head>
<body>
    <div class="container">
        <h2>Request a Quote</h2>
        <form id="quoteForm">
            <label for="fullName">Full Name:</label>
            <input type="text" id="fullName" required>

            <label for="email">Email:</label>
            <input type="email" id="email" required>

            <label for="phone">Phone Number:</label>
            <input type="tel" id="phone" required>

            <label for="serviceType">Type of Security Service:</label>
            <select id="serviceType" multiple required>
                <option value="Tactical Security">Tactical Security</option>
                <option value="Unarmed Security Guards">Unarmed Security Guards</option>
                <option value="Armed Security Guards">Armed Security Guards</option>
                <option value="Mobile Patrol Services">Mobile Patrol Services</option>
                <option value="Fire Watch Security">Fire Watch Security</option>
                <option value="Construction Site Security">Construction Site Security</option>
                <option value="Alarm Response Security">Alarm Response Security</option>
            </select>

            <label for="numGuards">Number of Guards:</label>
            <select id="numGuards">
                <option value="1">1</option>
                <option value="5">5</option>
                <option value="10">10+</option>
            </select>

            <label for="startDate">Start Date:</label>
            <input type="date" id="startDate" required>

            <label for="duration">Duration:</label>
            <select id="duration">
                <option value="Short-term">Short-term</option>
                <option value="Long-term">Long-term</option>
            </select>

            <button type="submit">Get Quote</button>
        </form>
    </div>

    <script>
        document.getElementById("quoteForm").addEventListener("submit", async function(event) {
            event.preventDefault();

            const formData = {
                fullName: document.getElementById("fullName").value,
                email: document.getElementById("email").value,
                phone: document.getElementById("phone").value,
                serviceType: Array.from(document.getElementById("serviceType").selectedOptions).map(opt => opt.value),
                numGuards: document.getElementById("numGuards").value,
                startDate: document.getElementById("startDate").value,
                duration: document.getElementById("duration").value,
            };

            const response = await fetch("/api/generate-quote", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(formData)
            });

            const data = await response.json();
            alert(data.message);
        });
    </script>
</body>
</html>
